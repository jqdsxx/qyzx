<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>登录 - 企信聚合</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body style="background:var(--color-bg-gray)">

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo"><span class="logo-icon">企</span>企信聚合</a>
    <nav class="main-nav">
      <a href="index.html">首页</a><a href="news-list.html">资讯中心</a><a href="categories.html">分类频道</a>
      <a href="enterprise-list.html">入驻企业</a><a href="about.html">平台介绍</a><a href="help.html">帮助中心</a>
    </nav>
    <div class="header-right">
      <form class="header-search search-form" action="search.html">
        <input type="text" name="q" placeholder="搜索资讯、企业..." class="search-input-from-url">
        <button type="submit"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></button>
      </form>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()" style="padding:6px"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
    </div>
  </div>
</header>
<div id="mobile-overlay" class="mobile-overlay" onclick="toggleMobileMenu()"></div>
<div id="mobile-drawer" class="mobile-drawer">
  <button class="close-btn" onclick="toggleMobileMenu()">&times;</button>
  <div style="margin-top:40px" class="mobile-nav">
    <a href="index.html">首页</a><a href="news-list.html">资讯中心</a><a href="categories.html">分类频道</a><a href="enterprise-list.html">入驻企业</a><a href="about.html">平台介绍</a><a href="help.html">帮助中心</a>
  </div>
</div>

<main>
  <div class="login-page">
    <div class="login-box">
      <!-- Tabs -->
      <div class="tabs" style="margin-bottom:24px;margin-top:-8px">
        <span class="tab-item active" data-tab="login-panel" onclick="document.getElementById('login-panel').classList.remove('hidden');document.getElementById('register-panel').classList.add('hidden');this.classList.add('active');this.nextElementSibling.classList.remove('active')">账号登录</span>
        <span class="tab-item" data-tab="register-panel" onclick="document.getElementById('register-panel').classList.remove('hidden');document.getElementById('login-panel').classList.add('hidden');this.classList.add('active');this.previousElementSibling.classList.remove('active')">企业注册</span>
      </div>

      <!-- Login Form -->
      <div id="login-panel">
        <div class="form-group">
          <label class="form-label">账号</label>
          <input type="text" class="form-input" placeholder="请输入用户名或手机号">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" placeholder="请输入密码">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;font-size:.8rem">
          <label style="display:flex;align-items:center;gap:6px;color:var(--color-text-secondary);cursor:pointer">
            <input type="checkbox" style="accent-color:var(--color-primary)"> 记住登录
          </label>
          <a href="#" style="color:var(--color-primary)">忘记密码？</a>
        </div>
        <button class="btn btn-primary w-full btn-lg" onclick="window.location.href='user-center.html'">登 录</button>
        <div class="form-footer" style="margin-top:20px">
          <span style="color:var(--color-text-light)">还没有账号？</span>
          <a href="#">申请入驻 →</a>
        </div>
      </div>

      <!-- Register Form -->
      <div id="register-panel" class="hidden">
        <div class="form-group">
          <label class="form-label">企业名称</label>
          <input type="text" class="form-input" placeholder="请输入企业全称">
        </div>
        <div class="form-group">
          <label class="form-label">联系人</label>
          <input type="text" class="form-input" placeholder="请输入联系人姓名">
        </div>
        <div class="form-group">
          <label class="form-label">手机号</label>
          <div style="display:flex;gap:10px">
            <input type="tel" class="form-input" placeholder="请输入手机号" style="flex:1">
            <button class="btn btn-outline btn-sm" style="white-space:nowrap">获取验证码</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <input type="text" class="form-input" placeholder="请输入短信验证码">
        </div>
        <div class="form-group">
          <label class="form-label">设置密码</label>
          <input type="password" class="form-input" placeholder="请设置6-20位密码">
        </div>
        <button class="btn btn-primary w-full btn-lg" style="margin-top:8px">提交申请</button>
        <p style="font-size:.75rem;color:var(--color-text-light);text-align:center;margin-top:12px">提交后我们将在3个工作日内完成审核</p>
      </div>

      <!-- Other Login -->
      <div style="margin-top:28px;text-align:center">
        <div style="font-size:.8rem;color:var(--color-text-light);margin-bottom:14px">其他登录方式</div>
        <div style="display:flex;justify-content:center;gap:20px">
          <a href="#" style="width:40px;height:40px;border-radius:50%;background:#07c160;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:600">微</a>
          <a href="#" style="width:40px;height:40px;border-radius:50%;background:#1296db;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:600">Q</a>
          <a href="#" style="width:40px;height:40px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:600">企</a>
        </div>
      </div>

      <!-- Admin Entry -->
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--color-border-light);text-align:center">
        <a href="user-center.html" style="font-size:.8rem;color:var(--color-text-light)">管理后台入口 →</a>
      </div>
    </div>
  </div>
</main>

<script src="js/global.js"></script>
</body>
</html>
